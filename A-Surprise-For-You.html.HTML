<!DOCTYPE html>
<html>
<head>
<title>For Ammu ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Garamond, serif;
background:linear-gradient(180deg,#0f2027,#203a43,#2c5364);
overflow:hidden;
color:white;
text-align:center;
}

h1{
font-size:45px;
text-shadow:0 0 15px pink;
}

button{
padding:15px 35px;
font-size:20px;
margin:20px;
border:none;
border-radius:30px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#ff2e63;
color:white;
box-shadow:0 0 25px #ff2e63;
}

#yes:hover{
transform:scale(1.2);
box-shadow:0 0 40px #ff2e63;
}

#no{
background:#ddd;
position:absolute;
}

.heart{
position:absolute;
color:pink;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-900px);opacity:0;}
}

</style>

</head>

<body>

<div id="main">

<h1> Will you be my Valentine for the next 54 years? ❤️</h1>

<button id="yes">Yes 💖</button>
<button id="no">No</button>
 
</div>

<script>

let noBtn=document.getElementById("no");

noBtn.addEventListener("mouseover",function(){

let x=Math.random()*(window.innerWidth-100);
let y=Math.random()*(window.innerHeight-50);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

});

document.getElementById("yes").addEventListener("click",function(){

let main=document.getElementById("main");

main.innerHTML=`
<h1 style="font-size:70px;">❤️ AMMU ❤️</h1>
<h2>You just made me the happiest person alive and you never fail to make me the happiest as always.</h2>
<h3>Ik it's too late to ask you this or send you this one, but you always found this way of asking cute. So here I am.</h3>
<h1>I LOVE YOU THANGA 💖</h1>
<p style="font-size:22px;"> yours for the next 54 years ❤️</p>
`;

});

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(function(){
heart.remove();
},6000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
